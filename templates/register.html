{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block body %}

<div class="auth-wrapper">
  <div class="auth-card">

    <h1 class="auth-title">
      <span class="welcome-text">Create Account</span>
    </h1>

    <p class="auth-sub">Join and start chatting with AI</p>

    <form method="post" action="{{ url_for('register_post') }}" class="auth-form">
      
      <input type="text" name="username" placeholder="Choose Username" required />

      <input type="password" name="password" placeholder="Choose Password" required />

      <button class="btn-gradient full-btn" type="submit">
        Register
      </button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('login') }}">Login</a>
    </p>

  </div>
</div>

{% endblock %}
